<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Insurans - Vehicle Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="page-header">
    <button class="back-btn" onclick="goBack()">← Kembali</button>
    <h1 id="pageTitle">📄 Insurans</h1>
    <span style="width:44px;"></span>
</div>

<!-- ===== FORM ===== -->
<div class="form-container">
    <div class="form-title" id="formTitle">📝 Maklumat Insurans</div>
    
    <div class="form-group">
        <label>Ins_ID <span style="color:rgba(255,255,255,0.3);font-size:0.75rem;">(auto)</span></label>
        <input type="text" id="insId" disabled placeholder="Auto generated">
    </div>
    
    <div class="form-group">
        <label>No. Pendaftaran <span class="required">*</span></label>
        <select id="plateNo" required>
            <option value="">Pilih Kenderaan</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Tarikh Insurans <span class="required">*</span></label>
        <input type="text" id="insDate" placeholder="DD-MM-YYYY (contoh: 23-07-2026)" required>
        <div class="hint">Format: Hari-Bulan-Tahun (contoh: 23-07-2026)</div>
    </div>
    
    <div class="form-group">
        <label>No. Insurans <span class="required">*</span></label>
        <input type="text" id="insNo" placeholder="Contoh: NS2154POL" required>
    </div>
    
    <div class="form-group">
        <label>Gambar Insurans <span style="color:rgba(255,255,255,0.3);font-size:0.75rem;">(max 4, 3 optional)</span></label>
        <div class="image-upload-grid" id="insPicGrid">
            <div class="image-upload-item" data-index="0">
                <span>📷 1</span>
                <input type="file" accept="image/*" onchange="uploadInsPic(this, 0)">
            </div>
            <div class="image-upload-item" data-index="1">
                <span>📷 2</span>
                <input type="file" accept="image/*" onchange="uploadInsPic(this, 1)">
            </div>
            <div class="image-upload-item" data-index="2">
                <span>📷 3</span>
                <input type="file" accept="image/*" onchange="uploadInsPic(this, 2)">
            </div>
            <div class="image-upload-item" data-index="3">
                <span>📷 4</span>
                <input type="file" accept="image/*" onchange="uploadInsPic(this, 3)">
            </div>
        </div>
        <div class="hint">Tap gambar untuk pilih dari galeri</div>
    </div>
    
    <button class="btn-save" id="saveBtn" onclick="saveData()">💾 SAVE</button>
    <button class="btn-reset" onclick="resetForm()">🔄 Reset</button>
</div>

<script type="module">
    import { 
        getDataById, 
        getAllData,
        addData, 
        updateData, 
        uploadImage,
        deleteImage
    } from './firebase-config.js';

    // ===== CHECK LOGIN =====
    if (!sessionStorage.getItem('icNumber')) {
        window.location.href = 'login.html';
    }

    // ===== GET ID FROM URL =====
    const urlParams = new URLSearchParams(window.location.search);
    const editId = urlParams.get('id');
    const plateParam = urlParams.get('plate');
    let isEditMode = false;
    let existingData = null;
    let insPicUrls = ['', '', '', ''];

    // ===== DOM REFS =====
    const insIdInput = document.getElementById('insId');
    const plateNoSelect = document.getElementById('plateNo');
    const insDateInput = document.getElementById('insDate');
    const insNoInput = document.getElementById('insNo');
    const saveBtn = document.getElementById('saveBtn');
    const pageTitle = document.getElementById('pageTitle');
    const formTitle = document.getElementById('formTitle');

    // ===== LOAD VEHICLES FOR DROPDOWN =====
    async function loadVehicles() {
        try {
            const vehicles = await getAllData('kend');
            const select = plateNoSelect;
            const currentVal = select.value;
            select.innerHTML = '<option value="">Pilih Kenderaan</option>';
            
            vehicles.forEach(v => {
                const option = document.createElement('option');
                option.value = v.plate_no || '';
                option.textContent = `${v.plate_no || 'N/A'} - ${v.type || 'Unknown'}`;
                select.appendChild(option);
            });
            
            if (plateParam) {
                select.value = plateParam;
            } else if (currentVal) {
                select.value = currentVal;
            }
        } catch (error) {
            console.error('Error loading vehicles:', error);
        }
    }

    // ===== LOAD DATA IF EDIT MODE =====
    if (editId) {
        isEditMode = true;
        pageTitle.textContent = '✏️ Edit Insurans';
        formTitle.textContent = '✏️ Edit Maklumat Insurans';
        saveBtn.textContent = '💾 UPDATE';
        loadData(editId);
    }

    async function loadData(id) {
        try {
            const result = await getDataById('ins', id);
            if (result.success) {
                existingData = result.data;
                insIdInput.value = id;
                plateNoSelect.value = existingData.plate_no || '';
                insDateInput.value = existingData.ins_date || '';
                insNoInput.value = existingData.ins_no || '';
                
                if (existingData.ins_pic && Array.isArray(existingData.ins_pic)) {
                    existingData.ins_pic.forEach((url, index) => {
                        if (index < 4 && url) {
                            insPicUrls[index] = url;
                            showInsPic(index, url);
                        }
                    });
                }
            } else {
                showToast('Data tidak dijumpai', 'error');
                setTimeout(() => window.location.href = 'input_frontpage.html', 1500);
            }
        } catch (error) {
            showToast('Error: ' + error.message, 'error');
        }
    }

    // ===== IMAGE HANDLING =====
    window.uploadInsPic = async function(input, index) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            const result = await uploadImage(file);
            if (result.success) {
                insPicUrls[index] = result.url;
                showInsPic(index, result.url);
                showToast('Gambar ' + (index+1) + ' dimuat naik!', 'success');
            } else {
                showToast('Gagal muat naik: ' + result.error, 'error');
            }
        }
    };

    function showInsPic(index, url) {
        const container = document.querySelector(`.image-upload-item[data-index="${index}"]`);
        if (container) {
            container.innerHTML = `
                <img src="${url}" alt="Insurans ${index+1}">
                <button class="remove" onclick="event.stopPropagation(); removeInsPic(${index})">✕</button>
                <input type="file" accept="image/*" onchange="uploadInsPic(this, ${index})" style="position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;">
            `;
        }
    }

    window.removeInsPic = function(index) {
        insPicUrls[index] = '';
        const container = document.querySelector(`.image-upload-item[data-index="${index}"]`);
        if (container) {
            container.innerHTML = `
                <span>📷 ${index+1}</span>
                <input type="file" accept="image/*" onchange="uploadInsPic(this, ${index})">
            `;
        }
    };

    // ===== SAVE =====
    window.saveData = async function() {
        const plate = plateNoSelect.value;
        const insDate = insDateInput.value.trim();
        const insNo = insNoInput.value.trim();

        if (!plate) {
            showToast('Sila pilih No. Pendaftaran!', 'error');
            plateNoSelect.focus();
            return;
        }
        if (!insDate) {
            showToast('Sila masukkan Tarikh Insurans!', 'error');
            insDateInput.focus();
            return;
        }
        if (!insNo) {
            showToast('Sila masukkan No. Insurans!', 'error');
            insNoInput.focus();
            return;
        }

        // Validate date format DD-MM-YYYY
        const dateRegex = /^\d{2}-\d{2}-\d{4}$/;
        if (!dateRegex.test(insDate)) {
            showToast('Format tarikh salah! Guna DD-MM-YYYY', 'error');
            insDateInput.focus();
            return;
        }

        const pics = insPicUrls.filter(url => url !== '');

        const data = {
            plate_no: plate,
            ins_date: insDate,
            ins_no: insNo,
            ins_pic: pics
        };

        saveBtn.disabled = true;
        saveBtn.textContent = '⏳ Menyimpan...';

        try {
            let result;
            if (isEditMode && editId) {
                result = await updateData('ins', editId, data);
                if (result.success) {
                    showToast('Insurans berjaya dikemaskini!', 'success');
                }
            } else {
                result = await addData('ins', data);
                if (result.success) {
                    showToast('Insurans berjaya ditambah!', 'success');
                }
            }

            if (result && result.success) {
                setTimeout(() => {
                    window.location.href = 'input_frontpage.html';
                }, 1000);
            } else {
                showToast('Gagal: ' + (result?.error || 'Unknown error'), 'error');
                saveBtn.disabled = false;
                saveBtn.textContent = isEditMode ? '💾 UPDATE' : '💾 SAVE';
            }
        } catch (error) {
            showToast('Error: ' + error.message, 'error');
            saveBtn.disabled = false;
            saveBtn.textContent = isEditMode ? '💾 UPDATE' : '💾 SAVE';
        }
    };

    // ===== RESET =====
    window.resetForm = function() {
        if (isEditMode) {
            if (!confirm('Reset form? Data yang belum disimpan akan hilang.')) return;
            loadData(editId);
        } else {
            plateNoSelect.value = '';
            insDateInput.value = '';
            insNoInput.value = '';
            for (let i = 0; i < 4; i++) {
                removeInsPic(i);
            }
            showToast('Form telah direset', 'success');
        }
    };

    // ===== BACK =====
    window.goBack = function() {
        window.location.href = 'input_frontpage.html';
    };

    // ===== TOAST =====
    function showToast(message, type = 'success') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ===== INIT =====
    loadVehicles();
</script>

</body>
</html>
