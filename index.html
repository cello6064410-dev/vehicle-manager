<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vehicle Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
</head>
<body>

<div class="index-wrapper">
    <div class="index-card">
        <div class="index-header">
            <div class="index-icon">🚗</div>
            <h1>
                <span class="color-asli">Vehicle</span>
                <span class="color-busker">Manager</span>
            </h1>
            <p class="index-subtitle">Sistem Pengurusan Kenderaan Peribadi</p>
        </div>

        <div class="index-divider"></div>

        <div class="index-buttons">
            <button onclick="goToInput()" class="index-btn admin-btn">
                <div class="index-btn-icon">📝</div>
                <div class="index-btn-content">
                    <span class="index-btn-label">Input Data</span>
                    <span class="index-btn-desc">Tambah / Edit Data Kenderaan</span>
                </div>
                <div class="index-btn-arrow">→</div>
            </button>

            <button onclick="goToUsers()" class="index-btn viewer-btn" style="opacity:0.5; cursor:not-allowed;">
                <div class="index-btn-icon">👀</div>
                <div class="index-btn-content">
                    <span class="index-btn-label">Users (Coming Soon)</span>
                    <span class="index-btn-desc">Lihat Data Kenderaan</span>
                </div>
                <div class="index-btn-arrow">→</div>
            </button>
        </div>

        <div class="index-footer">
            <span style="color:#666; font-size:0.8rem;">Logged in as: <span id="userDisplay" style="color:#ffcc00;"></span></span>
            <br>
            <button onclick="logout()" style="margin-top:10px; background:#4a2a2a; color:white; border:none; padding:8px 20px; border-radius:8px; cursor:pointer;">🚪 Logout</button>
        </div>
    </div>
</div>

<style>
    .color-asli {
        background: linear-gradient(135deg, #ffcc00 0%, #ff8800 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .color-busker {
        background: linear-gradient(135deg, #ff8800 0%, #ff4400 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
</style>

<script>
    // ============================================
    // CHECK LOGIN
    // ============================================
    const icNumber = sessionStorage.getItem('icNumber');

    if (!icNumber) {
        window.location.href = 'login.html';
    }

    // Display IC
    document.getElementById('userDisplay').textContent = icNumber;

    // ============================================
    // NAVIGATION
    // ============================================
    function goToInput() {
        window.location.href = 'input.html';
    }

    function goToUsers() {
        alert('📢 Users page coming soon!');
    }

    function logout() {
        sessionStorage.removeItem('icNumber');
        window.location.href = 'login.html';
    }
</script>

</body>
</html>
