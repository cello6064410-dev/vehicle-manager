<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detail - Vehicle Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        .detail-wrapper {
            min-height: 100vh;
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
            padding: 16px;
            padding-bottom: 80px;
        }

        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 16px;
        }

        .detail-header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            margin: 0;
        }

        .detail-header .back-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.6);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 40px;
        }

        .detail-header .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .detail-section {
            background: rgba(26, 26, 46, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .detail-section .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 12px;
        }

        .image-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.3s ease;
        }

        .image-box:hover {
            border-color: rgba(255,255,255,0.1);
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-box .placeholder {
            font-size: 4rem;
            color: rgba(255,255,255,0.1);
        }

        .image-box .tap-hint {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.4);
        }

        .multi-image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-top: 8px;
        }

        .multi-image-grid .thumb {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.04);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.1);
            position: relative;
        }

        .multi-image-grid .thumb:hover {
            border-color: rgba(255,204,0,0.3);
            transform: scale(1.02);
        }

        .multi-image-grid .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 12px;
            margin-top: 12px;
        }

        .info-grid .info-item {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }

        .info-grid .info-item .info-label {
            opacity: 0.5;
        }

        .info-grid .info-item .info-value {
            color: rgba(255,255,255,0.85);
        }

        .info-grid .info-item .info-value.warning {
            color: #ff6b6b;
            font-weight: 600;
        }

        .info-grid .info-item .info-value.good {
            color: #00e676;
        }

        .maint-btn {
            width: 100%;
            padding: 14px;
            background: rgba(0,230,118,0.08);
            border: 1px solid rgba(0,230,118,0.15);
            border-radius: 12px;
            color: #00e676;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .maint-btn:hover {
            background: rgba(0,230,118,0.15);
            border-color: rgba(0,230,118,0.25);
            transform: translateY(-2px);
        }

        .maint-btn:active {
            transform: scale(0.97);
        }

        /* ===== FULLSCREEN OVERLAY ===== */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            flex-direction: column;
            cursor: pointer;
        }

        .fullscreen-overlay.active {
            display: flex;
        }

        .fullscreen-overlay .fs-image-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            touch-action: none;
            cursor: default;
        }

        .fullscreen-overlay .fs-image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            transform: scale(1);
            transition: transform 0.05s ease;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        .fullscreen-overlay .fs-close-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            background: rgba(0,0,0,0.4);
            padding: 8px 20px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-overlay .fs-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-overlay .fs-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.4);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }

        .fullscreen-overlay .fs-nav:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .fullscreen-overlay .fs-nav.prev {
            left: 12px;
        }

        .fullscreen-overlay .fs-nav.next {
            right: 12px;
        }

        @media (max-width: 480px) {
            .info-grid {
                grid-template-columns: 1fr;
                gap: 2px;
            }
            .image-box .placeholder {
                font-size: 3rem;
            }
            .detail-section {
                padding: 12px;
            }
            .multi-image-grid {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
                gap: 6px;
            }
            .fullscreen-overlay .fs-nav {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
        }

        @media (min-width: 768px) {
            .detail-wrapper {
                max-width: 600px;
                margin: 0 auto;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="detail-wrapper">

    <div class="detail-header">
        <button class="back-btn" onclick="goBack()">← Kembali</button>
        <h1 id="pageTitle">📄 Detail</h1>
        <span style="width:70px;"></span>
    </div>

    <!-- ===== KENDERAAN SECTION ===== -->
    <div class="detail-section" id="kendSection">
        <div class="section-title">🚗 Maklumat Kenderaan</div>
        <div class="image-box" id="kendImageBox" onclick="openFullscreen('kend', 0)">
            <span class="placeholder" id="kendPlaceholder">🚗</span>
            <span class="tap-hint">👆 Tap full screen</span>
        </div>
        <div class="info-grid" id="kendInfo">
            <div class="info-item"><span class="info-label">Plate :</span> <span class="info-value" id="kendPlate">-</span></div>
            <div class="info-item"><span class="info-label">Type :</span> <span class="info-value" id="kendType">-</span></div>
            <div class="info-item"><span class="info-label">Tahun :</span> <span class="info-value" id="kendYear">-</span></div>
        </div>
    </div>

    <!-- ===== RTAX SECTION ===== -->
    <div class="detail-section" id="rtaxSection">
        <div class="section-title">📑 Roadtax</div>
        <div class="image-box" id="rtaxImageBox" onclick="openFullscreen('rtax', 0)">
            <span class="placeholder" id="rtaxPlaceholder">📑</span>
            <span class="tap-hint">👆 Tap full screen</span>
        </div>
        <div class="info-grid" id="rtaxInfo">
            <div class="info-item"><span class="info-label">Rtax_date :</span> <span class="info-value" id="rtaxDate">-</span></div>
            <div class="info-item"><span class="info-label">Rtax_no :</span> <span class="info-value" id="rtaxNo">-</span></div>
        </div>
    </div>

    <!-- ===== INS SECTION ===== -->
    <div class="detail-section" id="insSection">
        <div class="section-title">📋 Insurans</div>
        <div class="info-grid" id="insInfo">
            <div class="info-item"><span class="info-label">Ins_date :</span> <span class="info-value" id="insDate">-</span></div>
            <div class="info-item"><span class="info-label">Ins_no :</span> <span class="info-value" id="insNo">-</span></div>
        </div>
        <div style="margin-top:8px;">
            <div style="font-size:0.7rem;color:rgba(255,255,255,0.2);margin-bottom:6px;">Gambar Insurans (tap untuk fullscreen)</div>
            <div class="multi-image-grid" id="insImageGrid"></div>
        </div>
    </div>

    <!-- ===== MAINTENANCE BUTTON ===== -->
    <button class="maint-btn" id="maintBtn" onclick="goToMaint()">
        🔧 MAINTENANCE →
    </button>

</div>

<!-- ===== FULLSCREEN OVERLAY ===== -->
<div class="fullscreen-overlay" id="fullscreenOverlay">
    <div class="fs-image-wrapper" id="fsImageWrapper">
        <img id="fullscreenImage" src="" alt="Fullscreen">
    </div>
    <button class="fs-nav prev" id="fsPrev" onclick="event.stopPropagation(); navigateFullscreen(-1)">‹</button>
    <button class="fs-nav next" id="fsNext" onclick="event.stopPropagation(); navigateFullscreen(1)">›</button>
    <span class="fs-counter" id="fsCounter">1 / 1</span>
    <span class="fs-close-hint" id="fsCloseHint">👆 Tap to close</span>
</div>

<script type="module">
    import { getAllData, getLatestPerPlate } from './firebase-config.js';

    // ============================================
    // CHECK LOGIN & CALLSIGN
    // ============================================
    if (!sessionStorage.getItem('icNumber')) {
        window.location.href = 'login.html';
    }

    function getCallsign(ic) {
        if (ic === '760726065607') return 'Asahan No.2';
        if (ic === '830808035728') return 'Asahan No.3';
        return ic;
    }

    // ============================================
    // GET PLATE FROM URL
    // ============================================
    const urlParams = new URLSearchParams(window.location.search);
    const plate = urlParams.get('plate');

    if (!plate) {
        document.querySelector('.detail-wrapper').innerHTML = `
            <div style="text-align:center;color:#ff6b6b;padding:40px;">
                ❌ Tiada plate number dipilih
            </div>
        `;
    }

    // ============================================
    // DOM REFS
    // ============================================
    const pageTitle = document.getElementById('pageTitle');
    const kendPlate = document.getElementById('kendPlate');
    const kendType = document.getElementById('kendType');
    const kendYear = document.getElementById('kendYear');
    const kendPlaceholder = document.getElementById('kendPlaceholder');
    const rtaxDate = document.getElementById('rtaxDate');
    const rtaxNo = document.getElementById('rtaxNo');
    const rtaxPlaceholder = document.getElementById('rtaxPlaceholder');
    const insDate = document.getElementById('insDate');
    const insNo = document.getElementById('insNo');
    const insImageGrid = document.getElementById('insImageGrid');

    const fullscreenOverlay = document.getElementById('fullscreenOverlay');
    const fullscreenImage = document.getElementById('fullscreenImage');
    const fsImageWrapper = document.getElementById('fsImageWrapper');
    const fsCounter = document.getElementById('fsCounter');
    const fsPrev = document.getElementById('fsPrev');
    const fsNext = document.getElementById('fsNext');

    // ============================================
    // FULLSCREEN STATE
    // ============================================
    let fullscreenImages = [];
    let currentIndex = 0;
    let currentScale = 1;
    let isZooming = false;

    // ============================================
    // NAVIGATION
    // ============================================
    window.goBack = function() {
        window.location.href = 'users.html';
    };

    window.goToMaint = function() {
        window.location.href = `user_maint.html?plate=${encodeURIComponent(plate)}`;
    };

    // ============================================
    // OPEN FULLSCREEN
    // ============================================
    window.openFullscreen = function(type, index) {
        if (type === 'kend') {
            const img = document.querySelector('#kendImageBox img');
            if (img && img.src) {
                fullscreenImages = [img.src];
                currentIndex = 0;
                showFullscreen();
            }
        } else if (type === 'rtax') {
            const img = document.querySelector('#rtaxImageBox img');
            if (img && img.src) {
                fullscreenImages = [img.src];
                currentIndex = 0;
                showFullscreen();
            }
        } else if (type === 'ins') {
            const thumbs = insImageGrid.querySelectorAll('.thumb img');
            if (thumbs.length > 0) {
                fullscreenImages = [];
                thumbs.forEach(img => {
                    if (img.src) fullscreenImages.push(img.src);
                });
                currentIndex = Math.min(index, fullscreenImages.length - 1);
                showFullscreen();
            }
        }
    };

    function showFullscreen() {
        if (fullscreenImages.length === 0) return;
        updateFullscreenImage();
        fullscreenOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        currentScale = 1;
        fullscreenImage.style.transform = 'scale(1)';
    }

    function updateFullscreenImage() {
        if (fullscreenImages.length > 0 && currentIndex < fullscreenImages.length) {
            fullscreenImage.src = fullscreenImages[currentIndex];
            fsCounter.textContent = `${currentIndex + 1} / ${fullscreenImages.length}`;
            fsPrev.style.display = fullscreenImages.length > 1 ? 'flex' : 'none';
            fsNext.style.display = fullscreenImages.length > 1 ? 'flex' : 'none';
            currentScale = 1;
            fullscreenImage.style.transform = 'scale(1)';
        }
    }

    window.navigateFullscreen = function(direction) {
        const newIndex = currentIndex + direction;
        if (newIndex >= 0 && newIndex < fullscreenImages.length) {
            currentIndex = newIndex;
            updateFullscreenImage();
        }
    };

    // ============================================
    // CLOSE FULLSCREEN
    // ============================================
    function closeFullscreen() {
        fullscreenOverlay.classList.remove('active');
        document.body.style.overflow = '';
        currentScale = 1;
    }

    window.closeFullscreen = closeFullscreen;

    // Close: Tap on overlay background, close hint, or wrapper
    fullscreenOverlay.addEventListener('click', function(e) {
        if (e.target === this || 
            e.target.id === 'fsCloseHint' || 
            e.target.closest('.fs-close-hint') ||
            e.target.id === 'fsImageWrapper' ||
            e.target === fsImageWrapper) {
            closeFullscreen();
        }
    });

    // Close with Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && fullscreenOverlay.classList.contains('active')) {
            closeFullscreen();
        }
    });

    // Close with Android back button
    window.addEventListener('popstate', function(e) {
        if (fullscreenOverlay.classList.contains('active')) {
            closeFullscreen();
        }
    });

    // ============================================
    // ZOOM - PINCH
    // ============================================
    let lastDistance = 0;
    let initialPinchScale = 1;

    fullscreenImage.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
            const t1 = e.touches[0];
            const t2 = e.touches[1];
            lastDistance = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            initialPinchScale = currentScale;
            isZooming = true;
        }
    }, { passive: true });

    fullscreenImage.addEventListener('touchmove', function(e) {
        if (e.touches.length === 2) {
            e.preventDefault();
            const t1 = e.touches[0];
            const t2 = e.touches[1];
            const distance = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            
            if (lastDistance > 0) {
                const ratio = distance / lastDistance;
                let newScale = Math.max(0.5, Math.min(3, initialPinchScale * ratio));
                currentScale = newScale;
                fullscreenImage.style.transform = `scale(${newScale})`;
                fullscreenImage.style.transition = 'none';
            }
        }
    }, { passive: false });

    fullscreenImage.addEventListener('touchend', function(e) {
        lastDistance = 0;
        isZooming = false;
    }, { passive: true });

    // ============================================
    // LOAD DATA
    // ============================================
    async function loadDetail() {
        pageTitle.textContent = `📄 ${plate}`;

        try {
            // Get vehicle
            const vehicles = await getAllData('kend');
            const vehicle = vehicles.find(v => v.plate_no === plate);

            if (vehicle) {
                kendPlate.textContent = vehicle.plate_no || '-';
                kendType.textContent = vehicle.type || '-';
                kendYear.textContent = vehicle.year || '-';

                if (vehicle.kend_pic) {
                    kendPlaceholder.innerHTML = `<img src="${vehicle.kend_pic}" alt="Kenderaan">`;
                }
            }

            // Get latest rtax
            const rtaxData = await getLatestPerPlate('rtax', plate);
            if (rtaxData.length > 0) {
                const rtax = rtaxData[0];
                rtaxDate.textContent = rtax.rtax_date || '-';
                rtaxNo.textContent = rtax.rtax_no || '-';

                // Check expiry
                if (rtax.rtax_date) {
                    const parts = rtax.rtax_date.split('-');
                    const expiry = new Date(parts[2], parts[1]-1, parts[0]);
                    const dateEl = document.querySelector('#rtaxInfo .info-item:nth-child(1) .info-value');
                    if (expiry < new Date()) {
                        dateEl.className = 'info-value warning';
                        dateEl.textContent = rtax.rtax_date + ' << expired! >>';
                    } else {
                        dateEl.className = 'info-value good';
                    }
                }

                if (rtax.rtax_pic) {
                    rtaxPlaceholder.innerHTML = `<img src="${rtax.rtax_pic}" alt="Roadtax">`;
                }
            }

            // Get latest ins
            const insData = await getLatestPerPlate('ins', plate);
            if (insData.length > 0) {
                const ins = insData[0];
                insDate.textContent = ins.ins_date || '-';
                insNo.textContent = ins.ins_no || '-';

                // Check expiry
                if (ins.ins_date) {
                    const parts = ins.ins_date.split('-');
                    const expiry = new Date(parts[2], parts[1]-1, parts[0]);
                    const dateEl = document.querySelector('#insInfo .info-item:nth-child(1) .info-value');
                    if (expiry < new Date()) {
                        dateEl.className = 'info-value warning';
                        dateEl.textContent = ins.ins_date + ' << expired! >>';
                    } else {
                        dateEl.className = 'info-value good';
                    }
                }

                // Render multiple images
                if (ins.ins_pic && ins.ins_pic.length > 0) {
                    insImageGrid.innerHTML = ins.ins_pic.map((url, index) => `
                        <div class="thumb" onclick="openFullscreen('ins', ${index})">
                            <img src="${url}" alt="Insurans ${index+1}">
                        </div>
                    `).join('');
                } else {
                    insImageGrid.innerHTML = `
                        <div style="grid-column:1/-1;text-align:center;color:rgba(255,255,255,0.1);padding:10px;font-size:0.8rem;">
                            Tiada gambar
                        </div>
                    `;
                }
            }

        } catch (error) {
            console.error('Error loading detail:', error);
        }
    }

    loadDetail();
</script>

</body>
</html>
